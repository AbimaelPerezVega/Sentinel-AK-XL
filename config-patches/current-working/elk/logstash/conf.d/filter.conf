# Basic Filter Configuration for Testing
filter {
  # Add basic fields
  mutate {
    add_field => {
      "processing_timestamp" => "%{@timestamp}"
      "environment" => "testing"
    }
  }
  
  # Simple conditional processing
  if "test" in [tags] {
    mutate {
      add_field => { "test_mode" => "true" }
    }
  }
  
  # Basic grok for common formats
  if [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:content}"
      }
      tag_on_failure => ["_grokparsefailure"]
    }
  }
  
  # Set index routing
  mutate {
    add_field => { "[@metadata][target_index]" => "test-logs-%{+YYYY.MM.dd}" }
  }
}
