# Basic Input Configuration for Testing
input {
  # Beats input
  beats {
    port => 5044
    host => "0.0.0.0"
    add_tag => ["beats", "test"]
  }
  
  # HTTP input for testing
  http {
    port => 8080
    host => "0.0.0.0"
    codec => json
    add_tag => ["http", "test"]
  }
  
  # TCP input for simple testing
  tcp {
    port => 9000
    codec => json_lines
    add_tag => ["tcp", "test"]
  }
}
