# Basic Output Configuration for Testing
output {
  # Primary Elasticsearch output
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "%{[@metadata][target_index]}"
    
    # Template for test indices
    manage_template => true
    template_name => "test-logs"
    template_pattern => ["test-logs-*"]
    template_overwrite => true
    
    template => {
      "index_patterns" => ["test-logs-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0,
        "refresh_interval" => "5s"
      }
    }
  }
  
  # Debug output for testing
  if "${DEBUG_MODE}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}
