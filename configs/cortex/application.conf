# Cortex 3.2 Configuration
db.janusgraph {
  storage.backend = cql
  storage.hostname = ["cassandra"]
  storage.cql.keyspace = cortex
  storage.cql.read-consistency-level = ONE
  storage.cql.write-consistency-level = ONE
  storage.port = 9042
  
  # Compatibility settings for Cassandra 4.0.17
  storage.cql.compression = false
  storage.cql.only-use-local-consistency-for-local-keyspace = true
  storage.cql.local-datacenter = datacenter1
  
  # Connection settings
  storage.connection-timeout = 30000
  storage.setup-wait = 120000
}

# Analyzer and Responder configuration
analyzer {
  urls = [
    "https://download.thehive-project.org/analyzers.json"
  ]
  path = ["/opt/Cortex-Analyzers/analyzers"]
}

responder {
  urls = [
    "https://download.thehive-project.org/responders.json"
  ]
  path = ["/opt/Cortex-Analyzers/responders"]
}

# Basic service configuration
http.address = 0.0.0.0
http.port = 9001
play.http.secret.key = "C0rt3x-S3cr3t-K3y-Ch4ng3-M3-Ph4s36!"
