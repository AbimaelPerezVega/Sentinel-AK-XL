input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  if [agent][type] == "filebeat" and "wazuh" in [tags] {
    # Parse Wazuh alerts
    if [fields][logstash_alias] == "wazuh-alerts" {
      json {
        source => "message"
      }
      
      # Extract timestamp
      date {
        match => [ "timestamp", "ISO8601" ]
      }
      
      # Enhance with additional fields
      mutate {
        add_field => { "event_type" => "wazuh_alert" }
        add_field => { "soc_environment" => "training" }
      }
      
      # Categorize by rule level
      if [rule][level] >= 12 {
        mutate { add_tag => ["critical"] }
      } else if [rule][level] >= 9 {
        mutate { add_tag => ["high"] }
      } else if [rule][level] >= 6 {
        mutate { add_tag => ["medium"] }
      } else {
        mutate { add_tag => ["low"] }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "changeme123!"
    index => "wazuh-alerts-%{+YYYY.MM.dd}"
    template_name => "wazuh"
    template_pattern => "wazuh-*"
    template => "/usr/share/logstash/templates/wazuh-template.json"
  }
}
