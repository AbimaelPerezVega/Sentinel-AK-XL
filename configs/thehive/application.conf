# TheHive 5.x Configuration - Compatible with Cassandra 4.0.17
db.janusgraph {
  storage.backend = cql
  storage.hostname = ["cassandra"]
  storage.cql.keyspace = thehive
  storage.cql.read-consistency-level = ONE
  storage.cql.write-consistency-level = ONE
  storage.port = 9042
  
  # Compatibility settings for Cassandra 4.0.17
  storage.cql.compression = false
  storage.cql.only-use-local-consistency-for-local-keyspace = true
  storage.cql.local-datacenter = datacenter1
  
  # Connection settings
  storage.cql.ssl.enabled = false
  storage.batch-loading = true
  storage.buffer-size = 1024
  
  # Extended timeouts for better connectivity
  storage.connection-timeout = 30000
  storage.setup-wait = 120000
  storage.read-time = 10000
  storage.write-time = 10000
}

# Authentication providers
auth {
  providers = [
    {name = session}
    {name = local}
  ]
}

# Basic service configuration
http.address = 0.0.0.0
http.port = 9000
play.http.secret.key = "ThHiv3-S3cr3t-K3y-Ch4ng3-M3-Ph4s36!"

# Index backend - using Elasticsearch from main stack
search {
  index = thehive
  backend = elasticsearch
  elasticsearch {
    hosts = ["http://sentinel-elasticsearch:9200"]
    index.name = thehive
    client.transport.sniff = false
    client.transport.ignore_cluster_name = false
  }
}

# File storage configuration
storage {
  provider = localfs
  localfs.location = /opt/thp/thehive/files
}

# Cortex integration
cortex {
  servers = [
    {
      name = local
      url = "http://cortex:9001"
      auth {
        type = "bearer"
        key = "CORTEX_API_KEY_PLACEHOLDER"
      }
    }
  ]
}

# Organization configuration
organization.defaults = ["SOC-Team"]

# Performance settings
play.ws.timeout.request = 60s
play.ws.timeout.connection = 30s
db.migration.auto = true
