# Sentinel AK-XL - UNIFIED STACK (Corrected)
networks:
  sentinel-network:
    name: sentinel-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  elasticsearch-data:
  kibana-data:
  logstash-data:
  wazuh-indexer-data:
  wazuh-etc:
  wazuh-logs:

services:
  # --- ELK STACK ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.2
    container_name: sentinel-elasticsearch
    hostname: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=sentinel-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./configs/elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      sentinel-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.2
    container_name: sentinel-kibana
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana-data:/usr/share/kibana/data
      - ./configs/elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      sentinel-network:
        ipv4_address: 172.20.0.11
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:9.1.2
    container_name: sentinel-logstash
    hostname: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms1g -Xmx1g"
      # REMOVED LOG_LEVEL to prevent substitution
    volumes:
      - ./configs/elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./configs/elk/logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./configs/elk/logstash/conf.d:/usr/share/logstash/pipeline/:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      sentinel-network:
        ipv4_address: 172.20.0.12
    depends_on:
      elasticsearch:
        condition: service_healthy

  # --- WAZUH STACK ---
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.12.0
    container_name: sentinel-wazuh-indexer
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${WAZUH_INDEXER_PASSWORD}
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./configs/wazuh/ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./configs/wazuh/ssl_certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem
      - ./configs/wazuh/ssl_certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem
      - ./configs/wazuh/ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./configs/wazuh/ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./configs/wazuh/indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
    ports:
      - "9201:9200"
    networks:
      - sentinel-network

  wazuh-manager:
    image: wazuh/wazuh-manager:4.12.0
    container_name: sentinel-wazuh-manager
    hostname: wazuh-manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - WAZUH_ELASTICSEARCH_URL=http://elasticsearch:9200 # Connect to ELK
    volumes:
      - wazuh-etc:/var/ossec/etc
      - wazuh-logs:/var/ossec/logs
      - ./configs/wazuh/ossec.conf:/var/ossec/etc/ossec.conf
      - ./configs/wazuh/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
    ports:
      - "1514:1514"
      - "55000:55000"
    networks:
      - sentinel-network
    depends_on:
      - wazuh-indexer
      - elasticsearch

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.12.0
    container_name: sentinel-wazuh-dashboard
    hostname: wazuh-dashboard
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh-manager
    volumes:
      # Certificate volume mounts (FIXED PATHS)
      - ./configs/wazuh/ssl_certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./configs/wazuh/ssl_certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./configs/wazuh/ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      # Configuration file mount
      - ./configs/wazuh/dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      # *** AGREGAR ESTA LÍNEA: ***
      - ./configs/wazuh/dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
    ports:
      - "8443:5601"
    networks:
      - sentinel-network
    depends_on:
      - wazuh-indexer
